<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>IA3: Proyecto 2 | Sign In</title>
		<meta name="author" content="Víctor M.N." />
		<!-- Favicon -->
		<link
			rel="shortcut icon"
			href="../images/header/plane.svg"
			type="image/x-icon" />
		<!-- Estilos -->
		<link rel="stylesheet" href="../style.css" />
	</head>
	<body class="body-signin">
		<header class="padding-general header flex justify-between align-center">
			<div class="div-logo flex div-header-global">
				<a class="logo flex align-center nostyle" href="../index.html">
					<img src="../images/header/plane.svg" alt="Logo Avion" />
					<h1 class="h1-logo flex align-center">my Dream Place</h1>
				</a>
			</div>
		</header>
		<main class="main-signin">
			<section class="section-main-signin">
				<h2 class="tit-signin">Sign in</h2>
				<form action="index-home-1.html" method="get" class="form-signin">
					<label for="email" class="label-auth">
						Email address
						<div class="div-label-auth">
							<input
								type="email"
								name="email"
								id="email"
								placeholder="Email address" />
						</div>
					</label>
					<label for="inputContraseña" class="label-auth">
						Password
						<div class="div-label-auth">
							<input
								type="password"
								name="password"
								id="inputContraseña"
								placeholder="Enter password" />
							<img
								src="../images/forms/eye.svg"
								alt="Alternar contraseña Icono"
								id="imgAlternarContraseña" />
						</div>
					</label>
					<div class="div-form-forgot">
						<div class="form-forgot1">
							<input
								type="checkbox"
								name="keepme"
								id="keepme"
								class="form-checkbox" />
							<label for="keepme" class="label-keepme">Keep me signed in</label>
						</div>
						<div class="form-forgot2">
							<a href="forgot.html" class="a-forgotpass">Forgot password?</a>
						</div>
					</div>
					<button type="submit" class="form-button">Continue with email</button>
				</form>
				<div class="div-or-options">
					<hr class="hr-or-options" />
					<p class="p-or-options">or use one of these options</p>
					<hr class="hr-or-options" />
				</div>
				<button class="button-continue-google buttons-continue">
					<img
						src="../images/forms/google.svg"
						alt="Icono de Google"
						class="button-icons" />
					Continue with Google
				</button>
				<button class="button-continue-facebook buttons-continue">
					<img
						src="../images/forms/facebook.svg"
						alt="Icono de Facebook"
						class="button-icons" />
					Continue with Facebook
				</button>
				<p class="p-register">
					Don’t have an account?
					<a href="register.html" class="nostyle">Register</a>
				</p>
			</section>
		</main>
		<footer></footer>
		<script type="module" src="../js/password.js"></script>
	</body>
</html>
