<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>IA3: Proyecto 2 | Forgot</title>
		<meta name="author" content="Víctor M.N." />
		<!-- Favicon -->
		<link
			rel="shortcut icon"
			href="../../images/header/plane.svg"
			type="image/x-icon" />
		<!-- Estilos -->
		<link rel="stylesheet" href="../../style.css" />
	</head>
	<body class="body-signin">
		<header class="padding-general header flex justify-between align-center">
			<div class="div-logo flex div-header-global">
				<a class="logo flex align-center nostyle" href="../../index.html">
					<img src="../../images/header/plane.svg" alt="Logo Avion" />
					<h1 class="h1-logo flex align-center">my Dream Place</h1>
				</a>
			</div>
		</header>
		<main class="main-signin">
			<section class="section-main-signin">
				<h2 class="tit-signin">Forgot your password?</h2>
				<p class="p-signin">
					We’ll send you a link to reset it. Enter your email address used for
					My Dream Place
				</p>
				<form action="inbox.html" method="get" class="form-signin">
					<label for="email" class="label-auth">
						Your email address
						<div class="div-label-auth">
							<input
								type="email"
								name="email"
								id="email"
								placeholder="Email address" />
						</div>
					</label>
					<p class="error-msg"></p>
					<button type="submit" class="form-button-create">
						Send Reset Link
					</button>
				</form>
				<p class="p-terminos-forgot">
					By creating an account, you agree with our
					<a href="" class="nostyle">Terms and Conditions</a> and
					<a href="" class="nostyle">Privacy Statement</a>.
				</p>
			</section>
		</main>
		<footer></footer>
	</body>
</html>
