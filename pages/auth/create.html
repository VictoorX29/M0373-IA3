<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>IA3: Proyecto 2 | Create password</title>
		<meta name="author" content="Víctor M.N." />
		<!-- Favicon -->
		<link
			rel="shortcut icon"
			href="../../images/header/plane.svg"
			type="image/x-icon" />
		<!-- Estilos -->
		<link rel="stylesheet" href="../../style.css" />
	</head>
	<body class="body-signin">
		<header class="padding-general header flex justify-between align-center">
			<div class="div-logo flex div-header-global">
				<a class="logo flex align-center nostyle" href="../../index.html">
					<img src="../../images/header/plane.svg" alt="Logo Avion" />
					<h1 class="h1-logo flex align-center">my Dream Place</h1>
				</a>
			</div>
		</header>
		<main class="main-signin">
			<section class="section-main-signin">
				<h2 class="tit-signin">Create password</h2>
				<p class="p-signin">
					Use a minimum of 10 characters, including letters, lowercase letters,
					and numbers.
				</p>
				<form class="form-signin">
					<label for="inputContraseña" class="label-auth">
						Password
						<div class="div-label-auth">
							<input
								type="password"
								name="password"
								id="inputContraseña"
								placeholder="Enter password"
								required />
							<img
								src="../../images/forms/eye.svg"
								alt="Alternar contraseña Icono"
								id="imgAlternarContraseña" />
						</div>
					</label>
					<label for="inputRepetirContraseña" class="label-auth">
						Confirm password
						<div class="div-label-auth">
							<input
								type="password"
								name="password"
								id="inputRepetirContraseña"
								placeholder="Confirm password"
								required />
							<img
								src="../../images/forms/eye.svg"
								alt="Alternar contraseña Icono"
								id="imgAlternarRepetirContraseña" />
						</div>
					</label>
					<p class="error-msg"></p>
					<button type="submit" class="form-button-create">
						Create account
					</button>
				</form>
				<p class="p-terminos">
					By creating an account, you agree with our
					<a href="" class="nostyle">Terms and Conditions</a> and
					<a href="" class="nostyle">Privacy Statement</a>
				</p>
			</section>
		</main>
		<footer></footer>
		<script type="module" src="../../js/password.js"></script>
		<script type="module" src="../../js/auth/create.js"></script>
	</body>
</html>
